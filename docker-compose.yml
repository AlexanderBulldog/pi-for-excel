services:
  pi-for-excel:
    build:
      context: .
      dockerfile: Dockerfile.web
    # Plain HTTP. Put your own Caddy (or any reverse proxy) in front for TLS and
    # the /llm-gateway proxy. See deploy/Caddyfile.example.
    # Bind to 127.0.0.1 if the reverse proxy runs on the same host.
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Public HTTPS origin the reverse proxy serves. Used in manifest.prod.xml
      # and as the same-origin base for runtime-config.json (/llm-gateway/...).
      ADDIN_BASE_URL: ${ADDIN_BASE_URL:-https://pi-excel.internal.test}

      # First-run gateway preconfiguration. The real API key is NOT set here; the
      # host Caddy adds it server-side on the /llm-gateway upstream.
      CORPORATE_GATEWAY_NAME: ${CORPORATE_GATEWAY_NAME:-Company LLM}
      CORPORATE_GATEWAY_BASE_URL: ${OPENAI_BASE_URL:-}
      CORPORATE_GATEWAY_MODEL: ${LLM_MODEL:-}
      CORPORATE_GATEWAY_CONTEXT_WINDOW: ${CORPORATE_GATEWAY_CONTEXT_WINDOW:-65536}
    restart: unless-stopped
